name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Ruby unit suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec
